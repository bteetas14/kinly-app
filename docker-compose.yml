services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kinly
      POSTGRES_PASSWORD: kinly
      POSTGRES_DB: kinly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinly -d kinly"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kinly
      MINIO_ROOT_PASSWORD: kinlysecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      PORT: "8080"
      DATABASE_URL: postgres://kinly:kinly@postgres:5432/kinly?sslmode=disable
      JWT_SECRET: local-development-secret-change-me
      JWT_ISSUER: kinly
      CORS_ALLOWED_ORIGINS: "*"
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: kinly-images
      S3_ACCESS_KEY: kinly
      S3_SECRET_KEY: kinlysecret
      S3_REGION: us-east-1
      S3_USE_PATH_STYLE: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
